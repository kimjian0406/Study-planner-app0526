<!DOCTYPE html>
<html lang="ko" data-bs-theme="{{ theme or 'light' }}">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}공부 플래너{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="{% if theme == 'dark' %}bg-dark text-white{% else %}bg-body{% endif %}">

<nav class="navbar navbar-expand-lg {% if theme == 'dark' %}bg-dark{% else %}bg-body-tertiary{% endif %} mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('home.index') }}">📘 플래너</a>
    <div class="d-flex gap-2">
      <a href="{{ url_for('home.index') }}" class="btn btn-outline-primary btn-sm">홈</a>
      <a href="{{ url_for('home.calendar') }}" class="btn btn-outline-primary btn-sm">캘린더</a>
      <a href="{{ url_for('home.stats') }}" class="btn btn-outline-primary btn-sm">통계</a>
      <a href="{{ url_for('auth.mypage') }}" class="btn btn-outline-secondary btn-sm">마이페이지</a>
      <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-danger btn-sm">로그아웃</a>
      <a href="{{ url_for('home.toggle_theme') }}" class="btn btn-outline-dark btn-sm">
          {% if theme == 'dark' %}🌞 Light{% else %}🌙 Dark{% endif %}
      </a>
    </div>
  </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
