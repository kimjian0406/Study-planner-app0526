{% extends "base.html" %}
{% block title %}마이페이지{% endblock %}
{% block content %}
<div class="container py-5">
    <h2 class="mb-4">👤 마이페이지</h2>

    <p><strong>사용자명:</strong> {{ current_user.username }}</p>

    <form action="{{ url_for('auth.delete_account') }}" method="POST" onsubmit="return confirm('정말 계정을 삭제하시겠습니까? 모든 할 일 데이터가 삭제됩니다.')">
        <button type="submit" class="btn btn-danger">계정 삭제</button>
    </form>
</div>
{% endblock %}
