<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
    <h2 class="mb-4">회원가입</h2>
    <form method="POST">
        <input type="text" name="username" class="form-control mb-2" placeholder="아이디" required>
        <input type="password" name="password" class="form-control mb-2" placeholder="비밀번호" required>
        <button type="submit" class="btn btn-success">가입</button>
    </form>
    <p class="mt-3">이미 계정이 있으신가요? <a href="{{ url_for('auth.login') }}">로그인</a></p>
</body>
</html>
